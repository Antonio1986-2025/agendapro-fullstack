<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Clientes</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .mobile-app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); position: relative; }
    .header { position: sticky; top: 0; z-index: var(--z-sticky); background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: var(--space-md); }
    .header-content { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-md); }
    .header-title { display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--text-primary); }
    .back-btn { background: none; border: none; padding: var(--space-sm); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .search-box { position: relative; }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-box input { padding-left: 38px; }
    .main-content { padding: var(--space-md); padding-bottom: 100px; }
    .cli-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: 0.5rem; display: flex; align-items: center; gap: var(--space-md); transition: all var(--transition-fast); }
    .cli-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
    .cli-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-sm); font-weight: var(--font-semibold); flex-shrink: 0; letter-spacing: -0.02em; }
    .cli-info { flex: 1; min-width: 0; }
    .cli-nome { font-weight: var(--font-semibold); color: var(--text-primary); letter-spacing: -0.01em; font-size: var(--text-sm); margin-bottom: 0.125rem; }
    .cli-meta { font-size: var(--text-xs); color: var(--text-secondary); display: flex; align-items: center; gap: 0.375rem; }
    .cli-badge { font-size: 0.625rem; color: var(--primary-700); background: var(--primary-50); padding: 0.125rem 0.5rem; border-radius: var(--radius-full); font-weight: var(--font-medium); }
    .cli-actions { display: flex; gap: 0.25rem; }
    .icon-btn { background: var(--bg-card); border: 1px solid var(--border-color); width: 32px; height: 32px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); transition: all var(--transition-fast); display: inline-flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--primary-50); color: var(--primary-700); border-color: var(--primary-200); }
    .icon-btn.danger:hover { background: var(--error-light); color: var(--error-dark); border-color: rgba(220, 38, 38, 0.2); }
    .icon-btn.wa:hover { background: var(--success-light); color: var(--success-dark); border-color: rgba(22, 163, 74, 0.2); }
    .empty { text-align: center; padding: var(--space-3xl) var(--space-md); color: var(--text-tertiary); }
    .empty i { font-size: 2.5rem; margin-bottom: var(--space-md); display: block; opacity: .4; }
    .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; background: var(--primary-600); color: #fff; border: none; border-radius: var(--radius-full); box-shadow: var(--shadow-lg); cursor: pointer; font-size: var(--text-xl); z-index: var(--z-fixed); transition: all var(--transition-fast); }
    .fab:hover { background: var(--primary-700); transform: scale(1.05); box-shadow: var(--shadow-xl); }
    .fab:active { transform: scale(0.95); }
    .modal-overlay { position: fixed; inset: 0; background: var(--bg-overlay); display: none; align-items: flex-end; justify-content: center; z-index: var(--z-modal); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0; width: 100%; max-width: 480px; padding: var(--space-lg); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-lg); }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: var(--space-sm) 0; z-index: var(--z-sticky); }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: var(--space-sm); text-decoration: none; color: var(--text-secondary); border-radius: var(--radius-md); min-width: 56px; }
    .nav-item.active { color: var(--primary); background: var(--primary-light); }
    .nav-icon { font-size: var(--text-lg); margin-bottom: var(--space-xs); }
    .nav-label { font-size: var(--text-xs); font-weight: var(--font-medium); }
  </style>
</head>
<body>
  <div class="desktop-layout">
    <aside class="sidebar desktop-only">
      <div class="sidebar-logo">
        <i class="fas fa-calendar-check"></i>
        <span>AgendaPro</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard-mobile.html" class="sidebar-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="agenda-mobile.html" class="sidebar-item"><i class="fas fa-calendar"></i> Agenda</a>
        <a href="clientes-mobile.html" class="sidebar-item active"><i class="fas fa-users"></i> Clientes</a>
        <div class="nav-section">Gestão</div>
        <a href="servicos-mobile.html" class="sidebar-item"><i class="fas fa-cut"></i> Serviços</a>
        <a href="profissionais-mobile.html" class="sidebar-item"><i class="fas fa-user-tie"></i> Profissionais</a>
        <a href="estoque-mobile.html" class="sidebar-item"><i class="fas fa-boxes"></i> Estoque</a>
        <a href="financeiro-mobile.html" class="sidebar-item"><i class="fas fa-chart-line"></i> Financeiro</a>
        <div class="nav-section">Outros</div>
        <a href="relatorios-mobile.html" class="sidebar-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
        <a href="equipe.html" class="sidebar-item"><i class="fas fa-users-cog"></i> Equipe</a>
        <a href="horarios-especiais.html" class="sidebar-item"><i class="fas fa-clock"></i> Horários Especiais</a>
        <a href="configuracoes-mobile.html" class="sidebar-item"><i class="fas fa-cog"></i> Configurações</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user" onclick="API.logout()" title="Sair">
          <div class="avatar" id="sidebar-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-name">Usuário</div>
            <div class="user-role" id="sidebar-role">Proprietário</div>
          </div>
          <i class="fas fa-sign-out-alt" style="color: var(--text-muted); font-size: var(--text-sm);"></i>
        </div>
      </div>
    </aside>

    <div class="desktop-content">
      <div class="desktop-header desktop-only">
        <div>
          <h1 class="page-title">Clientes</h1>
          <p class="page-subtitle">Gerencie sua base de clientes</p>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()" style="background: var(--bg-card); border: 1px solid var(--border-color); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary);">
            <i class="fas fa-moon" id="theme-icon-desk"></i>
          </button>
        </div>
      </div>

      <div class="mobile-app">
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <button class="back-btn" onclick="location.href='dashboard-mobile.html'"><i class="fas fa-arrow-left"></i></button>
          <i class="fas fa-users"></i>
          <span>Clientes</span>
        </div>
        <button class="back-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input class="input" id="busca" placeholder="Buscar por nome ou telefone" oninput="filtrar()">
      </div>
    </header>

    <main class="main-content">
      <div id="lista"><div class="empty"><i class="fas fa-spinner fa-spin"></i> Carregando...</div></div>
      <div id="lista-tabela" class="desktop-only" style="margin-top: var(--space-md);"></div>
    </main>

    <button class="fab" onclick="abrirModal()" title="Adicionar cliente"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav">
      <div class="nav-items">
        <a href="dashboard-mobile.html" class="nav-item"><i class="nav-icon fas fa-home"></i><span class="nav-label">Início</span></a>
        <a href="agenda-mobile.html" class="nav-item"><i class="nav-icon fas fa-calendar"></i><span class="nav-label">Agenda</span></a>
        <a href="clientes-mobile.html" class="nav-item active"><i class="nav-icon fas fa-users"></i><span class="nav-label">Clientes</span></a>
        <a href="servicos-mobile.html" class="nav-item"><i class="nav-icon fas fa-cut"></i><span class="nav-label">Serviços</span></a>
        <a href="configuracoes-mobile.html" class="nav-item"><i class="nav-icon fas fa-cog"></i><span class="nav-label">Config</span></a>
        <a href="equipe.html" class="nav-item"><i class="nav-icon fas fa-users-cog"></i><span class="nav-label">Equipe</span></a>
      </div>
    </nav>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">Novo cliente</div>
      <div id="modal-alerta" class="alert"></div>
      <input type="hidden" id="f-id">
      <div class="field"><label>Nome *</label><input class="input" id="f-nome" placeholder="Ex: Maria Souza"></div>
      <div class="field"><label>Telefone (WhatsApp) *</label><input class="input" id="f-telefone" placeholder="Ex: 67999990000"></div>
      <div class="field"><label>Email</label><input class="input" id="f-email" type="email" placeholder="opcional"></div>
      <div class="field"><label>Observações</label><input class="input" id="f-obs" placeholder="opcional"></div>
      <div style="display:flex; gap: var(--space-sm); margin-top: var(--space-md);">
        <button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary btn-full" id="btn-salvar" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    API.exigirLogin();
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
      else { html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
      const cls = isDark ? 'fa-moon' : 'fa-sun';
      document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas ' + cls);
    }
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas fa-sun'); }
    document.addEventListener('DOMContentLoaded', function() {
      const user = API.getUser();
      if (user) {
        const avatar = document.getElementById('sidebar-avatar');
        const name = document.getElementById('sidebar-name');
        const role = document.getElementById('sidebar-role');
        if (avatar) avatar.textContent = (user.nome || 'U').charAt(0).toUpperCase();
        if (name) name.textContent = user.nome || 'Usuário';
        if (role) role.textContent = user.role === 'owner' ? 'Proprietário' : user.role;
      }
    });

    let clientes = [];

    async function carregar() {
      try { clientes = await API.get('/clientes'); render(clientes); }
      catch (e) { document.getElementById('lista').innerHTML = `<div class="empty"><i class="fas fa-triangle-exclamation"></i> Erro: ${e.message}</div>`; }
    }

    function filtrar() {
      const q = document.getElementById('busca').value.toLowerCase();
      render(clientes.filter(c => c.nome.toLowerCase().includes(q) || (c.telefone||'').includes(q)));
    }

    function render(lista) {
      const cont = document.getElementById('lista');
      if (!lista.length) {
        cont.innerHTML = `<div class="empty"><i class="fas fa-users"></i>Nenhum cliente encontrado.<br>Toque no + para adicionar.</div>`;
      } else {
        cont.innerHTML = lista.map(c => `
          <div class="cli-card">
            <div class="cli-avatar">${c.nome.charAt(0).toUpperCase()}</div>
            <div class="cli-info">
              <div class="cli-nome">${c.nome}</div>
              <div class="cli-meta"><i class="fas fa-phone" style="font-size:11px"></i> ${c.telefone || 'sem telefone'}
                ${c.total_visitas > 0 ? `<span class="cli-badge">${c.total_visitas} visita(s)</span>` : ''}</div>
            </div>
            <div class="cli-actions">
              ${c.telefone ? `<button class="icon-btn wa" onclick="abrirWhats('${c.telefone}')"><i class="fab fa-whatsapp"></i></button>` : ''}
              <button class="icon-btn" onclick='editar(${JSON.stringify(c)})'><i class="fas fa-pen"></i></button>
              <button class="icon-btn danger" onclick="excluir('${c.id}','${c.nome.replace(/'/g,"")}')"><i class="fas fa-trash"></i></button>
            </div>
          </div>`).join('');
      }
      renderTabela(lista);
    }

    function renderTabela(lista) {
      const cont = document.getElementById('lista-tabela');
      if (!lista.length) { cont.innerHTML = ''; return; }
      cont.innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title">${lista.length} cliente(s)</div>
          <button class="btn btn-primary btn-sm" onclick="abrirModal()"><i class="fas fa-plus"></i> Novo</button>
        </div>
        <div class="section-card-body" style="padding:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>Visitas</th>
                <th style="text-align:right;">Ações</th>
              </tr>
            </thead>
            <tbody>
              ${lista.map(c => `<tr>
                <td><strong>${c.nome}</strong></td>
                <td>${c.telefone || '-'}</td>
                <td>${c.email || '-'}</td>
                <td>${c.total_visitas || 0}</td>
                <td class="cell-actions">
                  ${c.telefone ? `<button class="icon-btn wa" onclick="abrirWhats('${c.telefone}')" title="WhatsApp"><i class="fab fa-whatsapp" style="color:var(--success)"></i></button>` : ''}
                  <button class="icon-btn" onclick='editar(${JSON.stringify(c)})' title="Editar"><i class="fas fa-pen"></i></button>
                  <button class="icon-btn danger" onclick="excluir('${c.id}','${c.nome.replace(/'/g,"")}')" title="Excluir"><i class="fas fa-trash"></i></button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    function abrirWhats(tel) {
      let n = tel.replace(/\D/g,''); if (n.length <= 11) n = '55' + n;
      window.open('https://wa.me/' + n, '_blank');
    }

    function abrirModal() {
      document.getElementById('modal-title').textContent = 'Novo cliente';
      ['f-id','f-nome','f-telefone','f-email','f-obs'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }
    function editar(c) {
      document.getElementById('modal-title').textContent = 'Editar cliente';
      document.getElementById('f-id').value = c.id;
      document.getElementById('f-nome').value = c.nome;
      document.getElementById('f-telefone').value = c.telefone || '';
      document.getElementById('f-email').value = c.email || '';
      document.getElementById('f-obs').value = c.observacoes || '';
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }
    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    async function salvar() {
      const id = document.getElementById('f-id').value;
      const dados = {
        nome: document.getElementById('f-nome').value.trim(),
        telefone: document.getElementById('f-telefone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        observacoes: document.getElementById('f-obs').value.trim(),
      };
      const a = document.getElementById('modal-alerta');
      if (!dados.nome || !dados.telefone) { a.textContent = 'Nome e telefone são obrigatórios'; a.className = 'alert error'; return; }
      const btn = document.getElementById('btn-salvar');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        if (id) await API.put('/clientes/' + id, dados);
        else await API.post('/clientes', dados);
        fecharModal(); await carregar();
      } catch (e) { a.textContent = e.message; a.className = 'alert error'; }
      finally { btn.disabled = false; btn.textContent = 'Salvar'; }
    }

    async function excluir(id, nome) {
      if (!confirm(`Excluir o cliente "${nome}"?`)) return;
      try { await API.del('/clientes/' + id); await carregar(); }
      catch (e) { alert('Erro ao excluir: ' + e.message); }
    }

    carregar();
  </script>
</body>
</html>
