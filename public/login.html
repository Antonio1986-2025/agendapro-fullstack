<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Entrar</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: var(--space-md); }
    .auth-card { background: var(--bg-card); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); width: 100%; max-width: 420px; padding: var(--space-xl); }
    .auth-logo { text-align: center; margin-bottom: var(--space-lg); }
    .auth-logo i { font-size: 2.5rem; color: var(--primary); }
    .auth-logo h1 { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--text-primary); margin-top: var(--space-sm); }
    .auth-logo p { color: var(--text-secondary); font-size: var(--text-sm); }
    .tabs { display: flex; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 3px; margin-bottom: var(--space-lg); }
    .tab { flex: 1; text-align: center; padding: var(--space-sm); border-radius: var(--radius-sm); cursor: pointer; font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--text-secondary); border: none; background: none; transition: all var(--transition-fast); }
    .tab.active { background: var(--primary); color: #fff; }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .alert.success { background: var(--success-light); color: var(--success); display: block; }
    .hidden { display: none; }
    .muted { text-align: center; font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-md); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .senha-wrapper { position: relative; }
    .senha-wrapper .input { padding-right: 40px; }
    .senha-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
    .forca { height: 4px; border-radius: 2px; margin-top: 4px; transition: all var(--transition-fast); }
    .forca.fraca { background: var(--error); width: 33%; }
    .forca.media { background: var(--warning); width: 66%; }
    .forca.forte { background: var(--success); width: 100%; }
    .forca-label { font-size: var(--text-xs); margin-top: 2px; display: block; }
    .forca-label.fraca { color: var(--error); }
    .forca-label.media { color: var(--warning); }
    .forca-label.forte { color: var(--success); }
    .spinner-btn { display: none; }
    .btn-loading .spinner-btn { display: inline; }
    .btn-loading .text-btn { display: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fas fa-calendar-check"></i>
      <h1>AgendaPro</h1>
      <p>Sistema de agendamentos para barbearias</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="mostrar('login')">Entrar</button>
      <button class="tab" id="tab-registro" onclick="mostrar('registro')">Criar conta</button>
    </div>

    <div id="alerta" class="alert"></div>

    <!-- LOGIN -->
    <form id="form-login" onsubmit="return fazerLogin(event)">
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="login-email" required placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="senha-wrapper">
          <input class="input" type="password" id="login-senha" required placeholder="Min. 6 caracteres">
          <button type="button" class="senha-toggle" onclick="toggleSenha('login-senha', this)" tabindex="-1"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button class="btn btn-primary btn-full btn-lg" type="submit" id="btn-login">
        <i class="fas fa-sign-in-alt text-btn"></i> <span class="text-btn">Entrar</span>
        <i class="fas fa-spinner fa-spin spinner-btn"></i> Entrando...
      </button>
      <p class="muted">Demo: demo@agendapro.com / 123456</p>
    </form>

    <!-- REGISTRO -->
    <form id="form-registro" class="hidden" onsubmit="return fazerRegistro(event)">
      <div class="field">
        <label>Nome da barbearia</label>
        <input class="input" type="text" id="reg-barbearia" required placeholder="Ex: Barbearia do Zé">
      </div>
      <div class="field">
        <label>Seu nome</label>
        <input class="input" type="text" id="reg-nome" required placeholder="Ex: José Silva">
      </div>
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="reg-email" required placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input class="input" type="tel" id="reg-telefone" placeholder="(67) 99999-0000" oninput="mascararTel(this)">
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="senha-wrapper">
          <input class="input" type="password" id="reg-senha" required minlength="6" placeholder="Min. 6 caracteres" oninput="avaliarForca(this.value)">
          <button type="button" class="senha-toggle" onclick="toggleSenha('reg-senha', this)" tabindex="-1"><i class="fas fa-eye"></i></button>
        </div>
        <div class="forca" id="forca-barra"></div>
        <span class="forca-label" id="forca-label"></span>
      </div>
      <button class="btn btn-primary btn-full btn-lg" type="submit" id="btn-registro">
        <i class="fas fa-rocket text-btn"></i> <span class="text-btn">Criar minha barbearia</span>
        <i class="fas fa-spinner fa-spin spinner-btn"></i> Criando conta...
      </button>
    </form>
  </div>

  <script src="api.js"></script>
  <script>
    if (API.getToken()) window.location.href = 'dashboard-mobile.html';

    function mostrar(qual) {
      document.getElementById('tab-login').classList.toggle('active', qual === 'login');
      document.getElementById('tab-registro').classList.toggle('active', qual === 'registro');
      document.getElementById('form-login').classList.toggle('hidden', qual !== 'login');
      document.getElementById('form-registro').classList.toggle('hidden', qual !== 'registro');
      esconderAlerta();
    }

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = 'alert ' + (tipo || 'error');
    }
    function esconderAlerta() {
      document.getElementById('alerta').className = 'alert';
    }

    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      btn.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    }

    function mascararTel(el) {
      let v = el.value.replace(/\D/g, '').slice(0, 11);
      if (v.length <= 2) el.value = '(' + v;
      else if (v.length <= 6) el.value = '(' + v.slice(0,2) + ') ' + v.slice(2);
      else if (v.length <= 10) el.value = '(' + v.slice(0,2) + ') ' + v.slice(2,6) + '-' + v.slice(6);
      else el.value = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
    }

    function avaliarForca(senha) {
      const barra = document.getElementById('forca-barra');
      const label = document.getElementById('forca-label');
      if (!senha) { barra.className = 'forca'; label.textContent = ''; return; }
      let forca = 0;
      if (senha.length >= 6) forca++;
      if (senha.length >= 8) forca++;
      if (/[A-Z]/.test(senha)) forca++;
      if (/[0-9]/.test(senha)) forca++;
      if (/[^a-zA-Z0-9]/.test(senha)) forca++;
      if (forca <= 2) { barra.className = 'forca fraca'; label.className = 'forca-label fraca'; label.textContent = 'Fraca'; }
      else if (forca <= 3) { barra.className = 'forca media'; label.className = 'forca-label media'; label.textContent = 'Média'; }
      else { barra.className = 'forca forte'; label.className = 'forca-label forte'; label.textContent = 'Forte'; }
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.classList.toggle('btn-loading', loading);
    }

    async function fazerLogin(e) {
      e.preventDefault();
      esconderAlerta();
      setLoading('btn-login', true);
      try {
        const r = await API.auth.login(
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-senha').value
        );
        API.setSession(r.token, r.usuario);
        const setup = await API.get('/auth/setup-status').catch(() => null);
        window.location.href = (setup && setup.pendente > 0) ? 'onboarding.html' : 'dashboard-mobile.html';
      } catch (err) {
        mostrarAlerta(err.message);
      } finally {
        setLoading('btn-login', false);
      }
      return false;
    }

    async function fazerRegistro(e) {
      e.preventDefault();
      esconderAlerta();
      setLoading('btn-registro', true);
      try {
        const r = await API.auth.registrar({
          barbeariaNome: document.getElementById('reg-barbearia').value.trim(),
          nome: document.getElementById('reg-nome').value.trim(),
          email: document.getElementById('reg-email').value.trim(),
          telefone: document.getElementById('reg-telefone').value.trim(),
          senha: document.getElementById('reg-senha').value,
        });
        API.setSession(r.token, r.usuario);
        window.location.href = 'onboarding.html';
      } catch (err) {
        mostrarAlerta(err.message);
      } finally {
        setLoading('btn-registro', false);
      }
      return false;
    }
  </script>
</body>
</html>
