<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Minha Agenda</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .topo { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; padding: var(--space-lg) var(--space-md); }
    .topo-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .topo-saudacao { font-size: var(--text-sm); opacity: 0.9; }
    .topo-nome { font-size: var(--text-xl); font-weight: var(--font-bold); margin-top: 2px; }
    .date-nav { display: flex; align-items: center; justify-content: center; gap: var(--space-md); margin-top: var(--space-md); }
    .date-nav button { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 36px; height: 36px; border-radius: var(--radius-md); cursor: pointer; }
    .date-nav button:hover { background: rgba(255,255,255,0.3); }
    .date-atual { font-weight: var(--font-semibold); font-size: var(--text-sm); text-transform: capitalize; min-width: 180px; text-align: center; }
    .topo-stats { display: flex; gap: var(--space-md); margin-top: var(--space-md); }
    .stat-item { background: rgba(255,255,255,0.15); border-radius: var(--radius-md); padding: var(--space-sm) var(--space-md); text-align: center; flex: 1; }
    .stat-num { font-size: var(--text-xl); font-weight: var(--font-bold); }
    .stat-label { font-size: var(--text-xs); opacity: 0.85; }
    .topo-acoes { display: flex; gap: var(--space-sm); }
    .topo-acoes button { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 40px; height: 40px; border-radius: var(--radius-md); cursor: pointer; font-size: var(--text-lg); }
    .main-content { padding: var(--space-md); }
    .tabs { display: flex; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 3px; margin-bottom: var(--space-md); }
    .tab { flex: 1; text-align: center; padding: var(--space-sm); border-radius: var(--radius-sm); cursor: pointer; font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--text-secondary); border: none; background: none; transition: all var(--transition-fast); }
    .tab.active { background: var(--primary); color: #fff; }
    .filtros { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); overflow-x: auto; padding-bottom: var(--space-xs); }
    .filtro-btn { background: var(--bg-secondary); border: none; padding: var(--space-xs) var(--space-md); border-radius: var(--radius-full); font-size: var(--text-sm); cursor: pointer; color: var(--text-secondary); white-space: nowrap; transition: all var(--transition-fast); }
    .filtro-btn.active { background: var(--primary); color: #fff; }
    .ag-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-sm); display: flex; align-items: center; gap: var(--space-md); border-left: 4px solid var(--border-color); }
    .ag-card.st-agendado { border-left-color: var(--warning); }
    .ag-card.st-confirmado { border-left-color: var(--success); }
    .ag-card.st-concluido { border-left-color: var(--primary); opacity: 0.75; }
    .ag-card.st-cancelado { border-left-color: var(--error); opacity: 0.5; }
    .ag-hora { background: var(--primary-light); color: var(--primary-dark); padding: var(--space-sm); border-radius: var(--radius-md); font-weight: var(--font-bold); min-width: 52px; text-align: center; font-size: var(--text-sm); }
    .ag-info { flex: 1; min-width: 0; }
    .ag-cliente { font-weight: var(--font-semibold); color: var(--text-primary); }
    .ag-serv { font-size: var(--text-sm); color: var(--text-secondary); }
    .ag-acoes { display: flex; gap: 4px; }
    .ag-acoes button { background: var(--bg-secondary); border: none; width: 34px; height: 34px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); font-size: var(--text-sm); transition: all var(--transition-fast); }
    .ag-acoes button:hover { background: var(--primary-light); color: var(--primary); }
    .empty { text-align: center; padding: var(--space-2xl); color: var(--text-muted); }
    .empty i { font-size: 2.5rem; margin-bottom: var(--space-md); display: block; opacity: 0.5; }
    .nav-inferior { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: var(--space-sm) 0; z-index: var(--z-sticky); }
    .nav-itens { display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: var(--space-sm); text-decoration: none; color: var(--text-secondary); border-radius: var(--radius-md); min-width: 60px; transition: all var(--transition-fast); }
    .nav-item.active { color: var(--primary); background: var(--primary-light); }
    .nav-icon { font-size: var(--text-lg); margin-bottom: var(--space-xs); }
    .nav-label { font-size: var(--text-xs); font-weight: var(--font-medium); }
    .ag-especial { font-size: 10px; background: var(--warning); color: #fff; padding: 1px 6px; border-radius: var(--radius-full); margin-left: 4px; vertical-align: middle; }
    @media (min-width: 768px) {
      .mobile-app { max-width: 100%; padding: 0 var(--space-lg); }
      .bottom-nav { display: none; }
    }
    .theme-toggle { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 40px; height: 40px; border-radius: var(--radius-md); cursor: pointer; font-size: var(--text-lg); }
  </style>
</head>
<body>
  <div class="desktop-layout">
    <aside class="sidebar desktop-only">
      <div class="sidebar-logo"><i class="fas fa-calendar-check"></i><span>AgendaPro</span></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="barbeiro.html" class="sidebar-item active"><i class="fas fa-calendar-day"></i> Minha Agenda</a>
        <a href="clientes-mobile.html" class="sidebar-item"><i class="fas fa-users"></i> Clientes</a>
        <div class="nav-section">Acesso</div>
        <a href="configuracoes-mobile.html" class="sidebar-item"><i class="fas fa-cog"></i> Configurações</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="API.logout()" title="Sair">
          <div class="avatar" id="sidebar-avatar">B</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-name">Barbeiro</div>
            <div class="user-role" id="sidebar-role">Barbeiro</div>
          </div>
          <i class="fas fa-sign-out-alt" style="color: var(--text-muted); font-size: var(--text-sm);"></i>
        </div>
      </div>
    </aside>
    <div class="desktop-content">
      <div class="desktop-header desktop-only">
        <div>
          <h1 class="page-title">Minha Agenda</h1>
          <p class="page-subtitle" id="desktop-data">Carregando...</p>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()" style="background: var(--bg-card); border: 1px solid var(--border-color); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary);">
            <i class="fas fa-moon" id="theme-icon-desk"></i>
          </button>
        </div>
      </div>
      <div class="mobile-app">
        <div class="topo">
          <div class="topo-header">
            <div>
              <div class="topo-saudacao">Olá,</div>
              <div class="topo-nome" id="barbeiro-nome">Carregando...</div>
            </div>
            <div class="topo-acoes">
              <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
              <button onclick="API.logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
            </div>
          </div>
          <div class="date-nav">
            <button onclick="mudarDia(-1)" title="Dia anterior"><i class="fas fa-chevron-left"></i></button>
            <span class="date-atual" id="data-label">Hoje</span>
            <button onclick="mudarDia(1)" title="Próximo dia"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div class="topo-stats">
            <div class="stat-item"><div class="stat-num" id="stat-hoje">0</div><div class="stat-label">Total</div></div>
            <div class="stat-item"><div class="stat-num" id="stat-pendentes">0</div><div class="stat-label">Pendentes</div></div>
            <div class="stat-item"><div class="stat-num" id="stat-concluidos">0</div><div class="stat-label">Concluídos</div></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-agenda" onclick="mostrarAba('agenda')"><i class="fas fa-calendar-day"></i> Minha Agenda</button>
        <button class="tab" id="tab-comissoes" onclick="mostrarAba('comissoes')"><i class="fas fa-coins"></i> Comissões</button>
      </div>
      <div class="main-content" style="padding-bottom:80px;">
        <div id="aba-agenda">
          <div class="filtros" id="filtros">
            <button class="filtro-btn active" onclick="filtrar('todos', this)">Todos</button>
            <button class="filtro-btn" onclick="filtrar('agendado', this)">Agendados</button>
            <button class="filtro-btn" onclick="filtrar('confirmado', this)">Confirmados</button>
            <button class="filtro-btn" onclick="filtrar('concluido', this)">Concluídos</button>
            <button class="filtro-btn" onclick="filtrar('cancelado', this)">Cancelados</button>
          </div>
          <div id="agenda-lista"><div class="empty"><i class="fas fa-spinner fa-spin"></i>Carregando...</div></div>
        </div>
        <div id="aba-comissoes" style="display:none;">
          <div class="topo-stats" style="margin-bottom:var(--space-md);">
            <div class="stat-item" style="background:var(--bg-secondary);color:var(--text-primary);"><div class="stat-num" id="saldo-pendente">R$ 0</div><div class="stat-label">Pendente</div></div>
            <div class="stat-item" style="background:var(--bg-secondary);color:var(--text-primary);"><div class="stat-num" id="saldo-pago">R$ 0</div><div class="stat-label">Recebido</div></div>
          </div>
          <div class="filtros">
            <button class="filtro-btn active" onclick="filtrarComissao('todas', this)">Todas</button>
            <button class="filtro-btn" onclick="filtrarComissao('pendente', this)">Pendentes</button>
            <button class="filtro-btn" onclick="filtrarComissao('pago', this)">Recebidas</button>
          </div>
          <div id="comissoes-lista"><div class="empty"><i class="fas fa-spinner fa-spin"></i>Carregando...</div></div>
        </div>
        <nav class="nav-inferior bottom-nav">
          <div class="nav-itens">
            <a href="#" class="nav-item active"><i class="nav-icon fas fa-calendar-day"></i><span class="nav-label">Agenda</span></a>
            <a href="clientes-mobile.html" class="nav-item"><i class="nav-icon fas fa-users"></i><span class="nav-label">Clientes</span></a>
            <a href="configuracoes-mobile.html" class="nav-item"><i class="nav-icon fas fa-cog"></i><span class="nav-label">Config</span></a>
          </div>
        </nav>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    if (!API.getToken()) window.location.href = 'login.html';

    let todosAgendamentos = [];
    let filtroAtual = 'todos';
    let filtroComissao = 'todas';
    let dataAtual = new Date();
    let profissionalId = null;
    let refreshTimer = null;
    let todasComissoes = [];

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
      else { html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
      document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas ' + (isDark ? 'fa-moon' : 'fa-sun'));
    }

    function dataISO(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

    function formatarData(d) {
      const hoje = new Date();
      const amanha = new Date(hoje); amanha.setDate(amanha.getDate()+1);
      const ontem = new Date(hoje); ontem.setDate(ontem.getDate()-1);
      if (dataISO(d) === dataISO(hoje)) return 'Hoje';
      if (dataISO(d) === dataISO(amanha)) return 'Amanhã';
      if (dataISO(d) === dataISO(ontem)) return 'Ontem';
      return d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function mudarDia(delta) {
      dataAtual.setDate(dataAtual.getDate() + delta);
      carregar();
    }

    function filtrar(status, btn) {
      filtroAtual = status;
      document.querySelectorAll('#aba-agenda .filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderizar();
    }

    function filtrarComissao(status, btn) {
      filtroComissao = status;
      document.querySelectorAll('#aba-comissoes .filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderizarComissoes();
    }

    function mostrarAba(aba) {
      document.getElementById('aba-agenda').style.display = aba === 'agenda' ? 'block' : 'none';
      document.getElementById('aba-comissoes').style.display = aba === 'comissoes' ? 'block' : 'none';
      document.getElementById('tab-agenda').classList.toggle('active', aba === 'agenda');
      document.getElementById('tab-comissoes').classList.toggle('active', aba === 'comissoes');
      if (aba === 'comissoes') carregarComissoes();
    }

    async function carregar() {
      try {
        const user = API.getUser();
        if (!user) return;

        document.getElementById('barbeiro-nome').textContent = user.nome || 'Barbeiro';
        document.getElementById('sidebar-name').textContent = user.nome || 'Barbeiro';
        document.getElementById('sidebar-avatar').textContent = (user.nome || 'B').charAt(0).toUpperCase();
        document.getElementById('sidebar-role').textContent = 'Barbeiro';

        profissionalId = user.profissional_id || null;
        document.getElementById('data-label').textContent = formatarData(dataAtual);
        document.getElementById('desktop-data').textContent = formatarData(dataAtual) + ' — ' + dataAtual.toLocaleDateString('pt-BR');

        const data = await API.get('/agendamentos?data=' + dataISO(dataAtual));
        todosAgendamentos = data || [];
        if (profissionalId) {
          todosAgendamentos = todosAgendamentos.filter(a => a.profissional_id === profissionalId);
        }

        renderizar();
      } catch (e) {
        document.getElementById('agenda-lista').innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i>Erro: ' + e.message + '</div>';
      }
    }

    function renderizar() {
      const el = document.getElementById('agenda-lista');
      let lista = todosAgendamentos;
      if (filtroAtual !== 'todos') lista = lista.filter(a => a.status === filtroAtual);

      const pendentes = todosAgendamentos.filter(a => a.status === 'agendado' || a.status === 'confirmado').length;
      const concluidos = todosAgendamentos.filter(a => a.status === 'concluido').length;
      document.getElementById('stat-hoje').textContent = todosAgendamentos.length;
      document.getElementById('stat-pendentes').textContent = pendentes;
      document.getElementById('stat-concluidos').textContent = concluidos;

      if (!lista.length) {
        el.innerHTML = '<div class="empty"><i class="fas fa-calendar-check"></i>Nenhum agendamento ' + (filtroAtual !== 'todos' ? filtroAtual : '') + ' nesse dia</div>';
        return;
      }

      el.innerHTML = lista.map(a => {
        const statusLabel = { agendado: 'Agendado', confirmado: 'Confirmado', concluido: 'Concluído', cancelado: 'Cancelado' }[a.status] || a.status;
        const hora = formatarHora(a.data_hora);
        const valor = a.preco ? 'R$ ' + parseFloat(a.preco).toFixed(2) : '';
        const statusTexto = a.status === 'cancelado' ? '<span style="color:var(--error);font-weight:var(--font-bold);font-size:var(--text-xs);text-transform:uppercase;display:block;margin-top:4px;">❌ CANCELADO</span>' : '';
        return `
          <div class="ag-card st-${a.status}">
            <div class="ag-hora">${hora}</div>
            <div class="ag-info">
              <div class="ag-cliente">${a.cliente_nome || 'Cliente'}</div>
              <div class="ag-serv">${a.servico_nome || 'Serviço'} ${valor ? ' • ' + valor : ''} ${a.is_especial ? '<span class="ag-especial">Especial</span>' : ''}${statusTexto}</div>
            </div>
            <div class="ag-acoes">
              ${a.status === 'agendado' ? `<button onclick="mudarStatus('${a.id}','confirmado')" title="Confirmar"><i class="fas fa-check"></i></button>` : ''}
              ${a.status === 'confirmado' ? `<button onclick="mudarStatus('${a.id}','concluido')" title="Concluir"><i class="fas fa-check-double"></i></button>` : ''}
              ${a.status !== 'cancelado' && a.status !== 'concluido' ? `<button onclick="mudarStatus('${a.id}','cancelado')" title="Cancelar"><i class="fas fa-times"></i></button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    async function mudarStatus(id, status) {
      try {
        await API.patch('/agendamentos/' + id + '/status', { status });
        await carregar();
      } catch (e) {
        alert('Erro: ' + e.message);
      }
    }

    async function carregarComissoes() {
      try {
        const saldo = await API.get('/comissoes/saldo');
        document.getElementById('saldo-pendente').textContent = 'R$ ' + (saldo.pendente || 0).toFixed(2);
        document.getElementById('saldo-pago').textContent = 'R$ ' + (saldo.pago || 0).toFixed(2);
        todasComissoes = await API.get('/comissoes');
        renderizarComissoes();
      } catch (e) {
        document.getElementById('comissoes-lista').innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i>Erro: ' + e.message + '</div>';
      }
    }

    function renderizarComissoes() {
      const el = document.getElementById('comissoes-lista');
      let lista = todasComissoes;
      if (filtroComissao !== 'todas') lista = lista.filter(c => c.status === filtroComissao);
      if (!lista.length) {
        el.innerHTML = '<div class="empty"><i class="fas fa-coins"></i>Nenhuma comissão encontrada</div>';
        return;
      }
      el.innerHTML = lista.map(c => `
        <div class="ag-card" style="border-left-color: ${c.status === 'pago' ? 'var(--success)' : 'var(--warning)'};">
          <div style="min-width:44px;text-align:center;font-size:var(--text-lg);">
            <i class="fas ${c.tipo === 'produto' ? 'fa-box' : 'fa-cut'}"></i>
          </div>
          <div class="ag-info">
            <div class="ag-cliente">${c.descricao}</div>
            <div class="ag-serv">${c.tipo === 'produto' ? 'Produto' : 'Serviço'} • R$ ${parseFloat(c.valor_item).toFixed(2)} • ${c.percentual}%</div>
            <div style="font-size:var(--text-xs);color:var(--text-muted);">${c.comanda_numero ? 'Comanda #' + c.comanda_numero : ''} • ${new Date(c.created_at).toLocaleDateString('pt-BR')}</div>
          </div>
          <div style="text-align:right;font-weight:var(--font-bold);color:${c.status === 'pago' ? 'var(--success)' : 'var(--warning)'};">
            R$ ${parseFloat(c.valor_comissao).toFixed(2)}
            <div style="font-size:var(--text-xs);font-weight:var(--font-medium);">${c.status === 'pago' ? 'Pago ✓' : 'Pendente'}</div>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', async function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas fa-sun');
      }
      await carregar();
      // Auto-refresh a cada 30s
      refreshTimer = setInterval(carregar, 30000);
    });
  </script>
</body>
</html>
