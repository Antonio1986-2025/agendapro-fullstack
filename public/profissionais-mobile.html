<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AgendaPro - Profissionais</title>
  <link rel="stylesheet" href="design-system.css?v=20260623">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .mobile-app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); position: relative; }
    .header { position: sticky; top: 0; z-index: var(--z-sticky); background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: var(--space-md); }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    .header-title { display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--text-primary); }
    .back-btn { background: none; border: none; padding: var(--space-sm); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .main-content { padding: var(--space-md); padding-bottom: 100px; }
    .prof-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-sm); display: flex; align-items: center; gap: var(--space-md); }
    .prof-avatar { width: 44px; height: 44px; background: var(--primary-light); color: var(--primary); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-lg); font-weight: var(--font-bold); flex-shrink: 0; }
    .prof-info { flex: 1; min-width: 0; }
    .prof-nome { font-weight: var(--font-semibold); color: var(--text-primary); }
    .prof-meta { font-size: var(--text-sm); color: var(--text-secondary); display: flex; align-items: center; gap: var(--space-xs); flex-wrap: wrap; }
    .prof-actions { display: flex; gap: var(--space-xs); }
    .icon-btn { background: var(--bg-secondary); border: none; width: 36px; height: 36px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .icon-btn:hover { background: var(--primary-light); color: var(--primary); }
    .icon-btn.danger:hover { background: var(--error-light); color: var(--error); }
    .empty { text-align: center; padding: var(--space-2xl); color: var(--text-muted); }
    .empty i { font-size: 2.5rem; margin-bottom: var(--space-md); display: block; opacity: .5; }
    .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; background: var(--primary-600); color: #fff; border: none; border-radius: var(--radius-full); box-shadow: var(--shadow-lg); cursor: pointer; font-size: var(--text-xl); z-index: var(--z-fixed); transition: all var(--transition-fast); }
    .fab:hover { background: var(--primary-700); transform: scale(1.05); box-shadow: var(--shadow-xl); }
    .fab:active { transform: scale(0.95); }
    .modal-overlay { position: fixed; inset: 0; background: var(--bg-overlay); display: none; align-items: flex-end; justify-content: center; z-index: var(--z-modal); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0; width: 100%; max-width: 480px; padding: var(--space-lg); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-lg); }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .checkbox-field { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md); }
    .checkbox-field input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
    .checkbox-field label { margin-bottom: 0; cursor: pointer; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: var(--font-medium); }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-error { background: var(--error-light); color: var(--error); }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: var(--space-sm) 0; z-index: var(--z-sticky); }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: var(--space-sm); text-decoration: none; color: var(--text-secondary); border-radius: var(--radius-md); min-width: 56px; }
    .nav-item.active { color: var(--primary); background: var(--primary-light); }
    .nav-icon { font-size: var(--text-lg); margin-bottom: var(--space-xs); }
    .nav-label { font-size: var(--text-xs); font-weight: var(--font-medium); }
@media (min-width: 768px) {
    .mobile-app { max-width: 100%; padding: 0 var(--space-lg); }
    .bottom-nav { display: none; }
    .main-content { padding-bottom: var(--space-md); }
  }
  </style>
</head>
<body>
  <div class="desktop-layout">
    <aside class="sidebar desktop-only">
      <div class="sidebar-logo">
        <i class="fas fa-calendar-check"></i>
        <span>AgendaPro</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard-mobile.html" class="sidebar-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="agenda-mobile.html" class="sidebar-item"><i class="fas fa-calendar"></i> Agenda</a>
        <a href="clientes-mobile.html" class="sidebar-item"><i class="fas fa-users"></i> Clientes</a>
        <div class="nav-section">Gestão</div>
        <a href="servicos-mobile.html" class="sidebar-item"><i class="fas fa-cut"></i> Serviços</a>
        <a href="profissionais-mobile.html" class="sidebar-item active"><i class="fas fa-user-tie"></i> Profissionais</a>
        <a href="estoque-mobile.html" class="sidebar-item"><i class="fas fa-boxes"></i> Estoque</a>
        <a href="financeiro-mobile.html" class="sidebar-item"><i class="fas fa-chart-line"></i> Financeiro</a>
        <div class="nav-section">Outros</div>
        <a href="relatorios-mobile.html" class="sidebar-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
        <a href="equipe.html" class="sidebar-item"><i class="fas fa-users-cog"></i> Equipe</a>

      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user" onclick="API.logout()" title="Sair">
          <div class="avatar" id="sidebar-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-name">Usuário</div>
            <div class="user-role" id="sidebar-role">Proprietário</div>
          </div>
          <i class="fas fa-sign-out-alt" style="color: var(--text-muted); font-size: var(--text-sm);"></i>
        </div>
      </div>
    </aside>

    <div class="desktop-content">
      <div class="desktop-header desktop-only">
        <div>
          <h1 class="page-title">Profissionais</h1>
          <p class="page-subtitle">Equipe da barbearia</p>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()" style="background: var(--bg-card); border: 1px solid var(--border-color); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary);">
            <i class="fas fa-moon" id="theme-icon-desk"></i>
          </button>
        </div>
      </div>

      <div class="mobile-app">
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <button class="back-btn" onclick="location.href='dashboard-mobile.html'"><i class="fas fa-arrow-left"></i></button>
          <i class="fas fa-user-tie"></i>
          <span>Profissionais</span>
        </div>
        <button class="back-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
      </div>
    </header>

    <main class="main-content">
      <div id="lista"><div class="empty"><i class="fas fa-spinner fa-spin"></i> Carregando...</div></div>
      <div id="lista-tabela" class="desktop-only" style="margin-top: var(--space-md);"></div>
    </main>

    <button class="fab" onclick="abrirModal()" title="Adicionar profissional"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav">
      <div class="nav-items">
        <a href="dashboard-mobile.html" class="nav-item"><i class="nav-icon fas fa-home"></i><span class="nav-label">Início</span></a>
        <a href="agenda-mobile.html" class="nav-item"><i class="nav-icon fas fa-calendar"></i><span class="nav-label">Agenda</span></a>
        <a href="servicos-mobile.html" class="nav-item"><i class="nav-icon fas fa-cut"></i><span class="nav-label">Serviços</span></a>
        <a href="profissionais-mobile.html" class="nav-item active"><i class="nav-icon fas fa-user-tie"></i><span class="nav-label">Equipe</span></a>
        <a href="configuracoes-mobile.html" class="nav-item"><i class="nav-icon fas fa-cog"></i><span class="nav-label">Config</span></a>
        <a href="equipe.html" class="nav-item"><i class="nav-icon fas fa-users-cog"></i><span class="nav-label">Equipe</span></a>
      </div>
    </nav>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">Novo profissional</div>
      <div id="modal-alerta" class="alert"></div>
      <input type="hidden" id="f-id">
      <div class="field">
        <label>Nome *</label>
        <input class="input" id="f-nome" placeholder="Nome do profissional">
      </div>
      <div class="field">
        <label>Especialidade</label>
        <input class="input" id="f-especialidade" placeholder="Ex: Cabelereiro">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input class="input" id="f-telefone" placeholder="(xx) xxxxx-xxxx" oninput="mascararTel(this)">
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="f-notificar" checked>
        <label for="f-notificar">Notificar via WhatsApp agendamentos</label>
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="f-responsavel">
        <label for="f-responsavel">Responsável (vê dados financeiros)</label>
      </div>
      <div class="row2">
        <div class="field">
          <label>Comissão Serviços (%)</label>
          <input class="input" id="f-comissao-serv" type="number" step="0.01" value="0">
        </div>
        <div class="field">
          <label>Comissão Produtos (%)</label>
          <input class="input" id="f-comissao-prod" type="number" step="0.01" value="0">
        </div>
      </div>
      <div class="field">
        <label>Data de Contrato</label>
        <input class="input" id="f-data-contrato" type="date">
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="f-criar-acesso" onchange="toggleAcesso()">
        <label for="f-criar-acesso">Criar acesso ao sistema</label>
      </div>
      <div id="campos-acesso" style="display:none;">
        <div class="field">
          <label>Email (login)</label>
          <input class="input" id="f-email" type="email" placeholder="email@exemplo.com">
        </div>
        <div class="field">
          <label>Senha</label>
          <input class="input" id="f-senha" type="password" placeholder="Mín. 6 caracteres">
        </div>
        <div class="field" style="margin-bottom: var(--space-xs);">
          <label style="margin-bottom: var(--space-sm);">Permissões</label>
          <div class="checkbox-field"><input type="checkbox" id="f-perm-clientes" checked><label for="f-perm-clientes">Gerenciar Clientes</label></div>
          <div class="checkbox-field"><input type="checkbox" id="f-perm-comandas" checked><label for="f-perm-comandas">Gerenciar Comandas</label></div>
          <div class="checkbox-field"><input type="checkbox" id="f-perm-gerenciar"><label for="f-perm-gerenciar">Gerenciar Profissionais/Serviços</label></div>
          <div class="checkbox-field"><input type="checkbox" id="f-perm-relatorios"><label for="f-perm-relatorios">Relatórios</label></div>
          <div class="checkbox-field"><input type="checkbox" id="f-perm-caixa"><label for="f-perm-caixa">Caixa/Financeiro</label></div>
        </div>
      </div>
      <div style="display:flex; gap: var(--space-sm); margin-top: var(--space-md);">
        <button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary btn-full" id="btn-salvar" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="api.js?v=20260623"></script>
  <script>
    API.exigirLogin();
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
      else { html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
      const cls = isDark ? 'fa-moon' : 'fa-sun';
      document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas ' + cls);
    }
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas fa-sun'); }
    document.addEventListener('DOMContentLoaded', function() {
      const user = API.getUser();
      if (user) {
        const avatar = document.getElementById('sidebar-avatar');
        const name = document.getElementById('sidebar-name');
        const role = document.getElementById('sidebar-role');
        if (avatar) avatar.textContent = (user.nome || 'U').charAt(0).toUpperCase();
        if (name) name.textContent = user.nome || 'Usuário';
        if (role) role.textContent = user.role === 'owner' ? 'Proprietário' : user.role;
      }
    });

    let profissionais = [];

    async function carregar() {
      try { profissionais = await API.get('/profissionais'); render(); }
      catch (e) { document.getElementById('lista').innerHTML = `<div class="empty"><i class="fas fa-triangle-exclamation"></i> Erro: ${e.message}</div>`; }
    }

    function render() {
      const cont = document.getElementById('lista');
      if (!profissionais.length) {
        cont.innerHTML = `<div class="empty"><i class="fas fa-user-tie"></i>Nenhum profissional cadastrado.<br>Toque no + para adicionar.</div>`;
        const te = document.getElementById('lista-tabela'); if(te) te.innerHTML = '';
        return;
      }
      cont.innerHTML = profissionais.map(p => `
        <div class="prof-card">
          <div class="prof-avatar">${p.nome.charAt(0).toUpperCase()}</div>
          <div class="prof-info">
            <div class="prof-nome">${p.nome}</div>
            <div class="prof-meta">
              <i class="fas fa-tag" style="font-size:11px"></i> ${p.especialidade || 'sem especialidade'}
              ${p.notificar_whatsapp !== false ? '<span class="badge badge-success" style="margin-left:var(--space-xs)"><i class="fas fa-bell" style="font-size:11px"></i> Notificar</span>' : ''}
            </div>
          </div>
          <div class="prof-actions">
            <button class="icon-btn" onclick='editar(${JSON.stringify(p)})'><i class="fas fa-pen"></i></button>
            <button class="icon-btn danger" onclick="excluir('${p.id}','${p.nome.replace(/'/g,"")}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>`).join('');
      renderTabela(profissionais);
    }

    function renderTabela(lista) {
      const cont = document.getElementById('lista-tabela');
      if (!lista.length) { cont.innerHTML = ''; return; }
      cont.innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title">${lista.length} profissional(is)</div>
          <button class="btn btn-primary btn-sm" onclick="abrirModal()"><i class="fas fa-plus"></i> Novo</button>
        </div>
        <div class="section-card-body" style="padding:0;">
          <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th data-label="NOME">Nome</th>
                <th data-label="ESPECIALIDADE">Especialidade</th>
                <th data-label="TELEFONE">Telefone</th>
                <th data-label="NOTIFICAR">Notificar WhatsApp</th>
                <th data-label="AÇÕES" style="text-align:right;">Ações</th>
              </tr>
            </thead>
            <tbody>
              ${lista.map(p => `<tr>
                <td data-label="Nome"><strong>${p.nome}</strong></td>
                <td data-label="Especialidade">${p.especialidade || '-'}</td>
                <td data-label="Telefone">${p.telefone || '-'}</td>
                <td data-label="Notificar">${p.notificar_whatsapp !== false ? '<span class="badge badge-success" style="text-transform:none;">Sim</span>' : '<span class="badge badge-error" style="text-transform:none;">Não</span>'}</td>
                <td data-label="Ações" class="cell-actions">
                  <button class="action-icon-btn edit" onclick='editar(${JSON.stringify(p)})' title="Editar"><i class="fas fa-pen"></i></button>
                  <button class="action-icon-btn delete" onclick="excluir('${p.id}','${p.nome.replace(/'/g,"")}')" title="Excluir"><i class="fas fa-trash"></i></button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
          </div>
        </div>
      </div>`;
    }

    function toggleAcesso() {
      document.getElementById('campos-acesso').style.display =
        document.getElementById('f-criar-acesso').checked ? 'block' : 'none';
    }

    function mascararTel(el) {
      let v = el.value.replace(/\D/g, '').slice(0, 11);
      if (v.length <= 2) el.value = '(' + v;
      else if (v.length <= 6) el.value = '(' + v.slice(0,2) + ') ' + v.slice(2);
      else if (v.length <= 10) el.value = '(' + v.slice(0,2) + ') ' + v.slice(2,6) + '-' + v.slice(6);
      else el.value = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
    }

    function abrirModal() {
      document.getElementById('modal-title').textContent = 'Novo profissional';
      document.getElementById('f-id').value = '';
      document.getElementById('f-nome').value = '';
      document.getElementById('f-especialidade').value = '';
      document.getElementById('f-telefone').value = '';
      document.getElementById('f-notificar').checked = true;
      document.getElementById('f-responsavel').checked = false;
      document.getElementById('f-comissao-serv').value = '0';
      document.getElementById('f-comissao-prod').value = '0';
      document.getElementById('f-data-contrato').value = '';
      document.getElementById('f-criar-acesso').checked = false;
      document.getElementById('campos-acesso').style.display = 'none';
      document.getElementById('f-email').value = '';
      document.getElementById('f-senha').value = '';
      document.getElementById('f-perm-clientes').checked = true;
      document.getElementById('f-perm-comandas').checked = true;
      document.getElementById('f-perm-gerenciar').checked = false;
      document.getElementById('f-perm-relatorios').checked = false;
      document.getElementById('f-perm-caixa').checked = false;
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }

    function editar(p) {
      document.getElementById('modal-title').textContent = 'Editar profissional';
      document.getElementById('f-id').value = p.id;
      document.getElementById('f-nome').value = p.nome;
      document.getElementById('f-especialidade').value = p.especialidade || '';
      document.getElementById('f-telefone').value = p.telefone || '';
      document.getElementById('f-notificar').checked = p.notificar_whatsapp !== false;
      document.getElementById('f-responsavel').checked = p.responsavel === true;
      document.getElementById('f-comissao-serv').value = p.comissao_servicos || 0;
      document.getElementById('f-comissao-prod').value = p.comissao_produtos || 0;
      document.getElementById('f-data-contrato').value = p.data_contrato || '';
      if (p.email) {
        document.getElementById('f-criar-acesso').checked = true;
        document.getElementById('campos-acesso').style.display = 'block';
        document.getElementById('f-email').value = p.email || '';
        document.getElementById('f-senha').value = '';
        document.getElementById('f-perm-clientes').checked = p.perm_clientes !== false;
        document.getElementById('f-perm-comandas').checked = p.perm_comandas !== false;
        document.getElementById('f-perm-gerenciar').checked = p.perm_gerenciar === true;
        document.getElementById('f-perm-relatorios').checked = p.perm_relatorios === true;
        document.getElementById('f-perm-caixa').checked = p.perm_caixa === true;
      }
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }

    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    async function salvar() {
      const id = document.getElementById('f-id').value;
      const criarAcesso = document.getElementById('f-criar-acesso').checked;
      const dados = {
        nome: document.getElementById('f-nome').value.trim(),
        especialidade: document.getElementById('f-especialidade').value.trim(),
        telefone: document.getElementById('f-telefone').value.trim(),
        notificar_whatsapp: document.getElementById('f-notificar').checked,
        responsavel: document.getElementById('f-responsavel').checked,
        comissao_servicos: parseFloat(document.getElementById('f-comissao-serv').value) || 0,
        comissao_produtos: parseFloat(document.getElementById('f-comissao-prod').value) || 0,
        data_contrato: document.getElementById('f-data-contrato').value || null,
      };
      if (!dados.nome) { const a = document.getElementById('modal-alerta'); a.textContent='Informe o nome'; a.className='alert error'; return; }
      if (criarAcesso) {
        dados.email = document.getElementById('f-email').value.trim();
        dados.senha = document.getElementById('f-senha').value;
        if (!dados.email) { const a = document.getElementById('modal-alerta'); a.textContent='Informe o email'; a.className='alert error'; return; }
        dados.perm_clientes = document.getElementById('f-perm-clientes').checked;
        dados.perm_comandas = document.getElementById('f-perm-comandas').checked;
        dados.perm_gerenciar = document.getElementById('f-perm-gerenciar').checked;
        dados.perm_relatorios = document.getElementById('f-perm-relatorios').checked;
        dados.perm_caixa = document.getElementById('f-perm-caixa').checked;
      }
      const btn = document.getElementById('btn-salvar');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        if (id) await API.put('/profissionais/' + id, dados);
        else await API.post('/profissionais', dados);
        fecharModal(); await carregar();
      } catch (e) {
        const a = document.getElementById('modal-alerta'); a.textContent = e.message; a.className = 'alert error';
      } finally { btn.disabled = false; btn.textContent = 'Salvar'; }
    }

    async function excluir(id, nome) {
      if (!confirm(`Excluir profissional "${nome}"?`)) return;
      try { await API.del('/profissionais/' + id); await carregar(); }
      catch (e) { alert('Erro ao excluir: ' + e.message); }
    }

    carregar();
    initMobilePage();
  </script>
</body>
</html>
