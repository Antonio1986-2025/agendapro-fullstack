<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Profissionais</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .mobile-app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); position: relative; }
    .header { position: sticky; top: 0; z-index: var(--z-sticky); background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: var(--space-md); }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    .header-title { display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--text-primary); }
    .back-btn { background: none; border: none; padding: var(--space-sm); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .main-content { padding: var(--space-md); padding-bottom: 100px; }
    .prof-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-md); display: flex; align-items: center; gap: var(--space-md); }
    .prof-avatar { width: 48px; height: 48px; background: var(--primary); color: #fff; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-lg); font-weight: var(--font-bold); flex-shrink: 0; }
    .prof-info { flex: 1; min-width: 0; }
    .prof-nome { font-weight: var(--font-semibold); color: var(--text-primary); }
    .prof-meta { font-size: var(--text-sm); color: var(--text-secondary); }
    .prof-tel { font-size: var(--text-xs); color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .prof-actions { display: flex; gap: var(--space-xs); }
    .icon-btn { background: var(--bg-secondary); border: none; width: 36px; height: 36px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .icon-btn:hover { background: var(--primary-light); color: var(--primary); }
    .icon-btn.danger:hover { background: var(--error-light); color: var(--error); }
    .empty { text-align: center; padding: var(--space-2xl); color: var(--text-muted); }
    .empty i { font-size: 2.5rem; margin-bottom: var(--space-md); display: block; opacity: .5; }
    .fab { position: fixed; bottom: 90px; right: calc(50% - 240px + 20px); width: 56px; height: 56px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-full); box-shadow: var(--shadow-lg); cursor: pointer; font-size: var(--text-xl); z-index: var(--z-fixed); }
    @media (max-width: 520px) { .fab { right: 20px; } }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: var(--bg-overlay); display: none; align-items: flex-end; justify-content: center; z-index: var(--z-modal); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0; width: 100%; max-width: 480px; padding: var(--space-lg); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-lg); }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .switch-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-sm) 0; }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: var(--space-sm) 0; z-index: var(--z-sticky); }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: var(--space-sm); text-decoration: none; color: var(--text-secondary); border-radius: var(--radius-md); min-width: 60px; }
    .nav-item.active { color: var(--primary); background: var(--primary-light); }
    .nav-icon { font-size: var(--text-lg); margin-bottom: var(--space-xs); }
    .nav-label { font-size: var(--text-xs); font-weight: var(--font-medium); }
  </style>
</head>
<body>
  <div class="mobile-app">
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <button class="back-btn" onclick="location.href='dashboard-mobile.html'"><i class="fas fa-arrow-left"></i></button>
          <i class="fas fa-user-tie"></i>
          <span>Profissionais</span>
        </div>
        <button class="back-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
      </div>
    </header>

    <main class="main-content">
      <div id="lista">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
      </div>
    </main>

    <button class="fab" onclick="abrirModal()" title="Adicionar profissional"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav">
      <div class="nav-items">
        <a href="dashboard-mobile.html" class="nav-item"><i class="nav-icon fas fa-home"></i><span class="nav-label">Dashboard</span></a>
        <a href="agenda-mobile.html" class="nav-item"><i class="nav-icon fas fa-calendar"></i><span class="nav-label">Agenda</span></a>
        <a href="clientes-mobile.html" class="nav-item"><i class="nav-icon fas fa-users"></i><span class="nav-label">Clientes</span></a>
        <a href="profissionais-mobile.html" class="nav-item active"><i class="nav-icon fas fa-user-tie"></i><span class="nav-label">Equipe</span></a>
        <a href="configuracoes-mobile.html" class="nav-item"><i class="nav-icon fas fa-cog"></i><span class="nav-label">Config</span></a>
      </div>
    </nav>
  </div>

  <!-- MODAL ADICIONAR/EDITAR -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">Novo profissional</div>
      <div id="modal-alerta" class="alert"></div>
      <input type="hidden" id="f-id">
      <div class="field">
        <label>Nome *</label>
        <input class="input" id="f-nome" placeholder="Ex: João Silva">
      </div>
      <div class="field">
        <label>Especialidade</label>
        <input class="input" id="f-especialidade" placeholder="Ex: Barbeiro Sênior">
      </div>
      <div class="field">
        <label>Telefone (WhatsApp) — recebe avisos de novos agendamentos</label>
        <input class="input" id="f-telefone" placeholder="Ex: 67999990000">
      </div>
      <div class="switch-row">
        <label style="margin:0">Receber avisos no WhatsApp</label>
        <input type="checkbox" id="f-notificar" checked style="width:20px;height:20px;">
      </div>
      <div style="display:flex; gap: var(--space-sm); margin-top: var(--space-lg);">
        <button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary btn-full" id="btn-salvar" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    API.exigirLogin();

    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (html.getAttribute('data-theme') === 'dark') { html.removeAttribute('data-theme'); icon.className='fas fa-moon'; localStorage.setItem('theme','light'); }
      else { html.setAttribute('data-theme','dark'); icon.className='fas fa-sun'; localStorage.setItem('theme','dark'); }
    }
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme','dark'); }

    let profissionais = [];

    async function carregar() {
      try {
        profissionais = await API.get('/profissionais');
        render();
      } catch (e) {
        document.getElementById('lista').innerHTML = `<div class="empty"><i class="fas fa-triangle-exclamation"></i> Erro ao carregar: ${e.message}</div>`;
      }
    }

    function render() {
      const cont = document.getElementById('lista');
      if (!profissionais.length) {
        cont.innerHTML = `<div class="empty"><i class="fas fa-user-tie"></i>Nenhum profissional cadastrado.<br>Toque no + para adicionar.</div>`;
        return;
      }
      cont.innerHTML = profissionais.map(p => `
        <div class="prof-card">
          <div class="prof-avatar">${(p.avatar_inicial || p.nome.charAt(0)).toUpperCase()}</div>
          <div class="prof-info">
            <div class="prof-nome">${p.nome}</div>
            <div class="prof-meta">${p.especialidade || 'Profissional'}</div>
            ${p.telefone ? `<div class="prof-tel"><i class="fab fa-whatsapp" style="color:var(--success)"></i> ${p.telefone}</div>` : '<div class="prof-tel"><i class="fas fa-phone-slash"></i> sem telefone</div>'}
          </div>
          <div class="prof-actions">
            <button class="icon-btn" onclick='editar(${JSON.stringify(p)})'><i class="fas fa-pen"></i></button>
            <button class="icon-btn danger" onclick="excluir('${p.id}','${p.nome.replace(/'/g,"")}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>`).join('');
    }

    function abrirModal() {
      document.getElementById('modal-title').textContent = 'Novo profissional';
      document.getElementById('f-id').value = '';
      document.getElementById('f-nome').value = '';
      document.getElementById('f-especialidade').value = '';
      document.getElementById('f-telefone').value = '';
      document.getElementById('f-notificar').checked = true;
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }
    function editar(p) {
      document.getElementById('modal-title').textContent = 'Editar profissional';
      document.getElementById('f-id').value = p.id;
      document.getElementById('f-nome').value = p.nome;
      document.getElementById('f-especialidade').value = p.especialidade || '';
      document.getElementById('f-telefone').value = p.telefone || '';
      document.getElementById('f-notificar').checked = p.notificar_whatsapp !== false;
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('modal').classList.add('open');
    }
    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    async function salvar() {
      const id = document.getElementById('f-id').value;
      const dados = {
        nome: document.getElementById('f-nome').value.trim(),
        especialidade: document.getElementById('f-especialidade').value.trim(),
        telefone: document.getElementById('f-telefone').value.trim(),
        notificar_whatsapp: document.getElementById('f-notificar').checked,
      };
      if (!dados.nome) {
        const a = document.getElementById('modal-alerta'); a.textContent = 'Informe o nome'; a.className = 'alert error'; return;
      }
      const btn = document.getElementById('btn-salvar');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        if (id) await API.put('/profissionais/' + id, dados);
        else await API.post('/profissionais', dados);
        fecharModal();
        await carregar();
      } catch (e) {
        const a = document.getElementById('modal-alerta'); a.textContent = e.message; a.className = 'alert error';
      } finally {
        btn.disabled = false; btn.textContent = 'Salvar';
      }
    }

    async function excluir(id, nome) {
      if (!confirm(`Excluir o profissional "${nome}"?`)) return;
      try { await API.del('/profissionais/' + id); await carregar(); }
      catch (e) { alert('Erro ao excluir: ' + e.message); }
    }

    carregar();
  </script>
</body>
</html>
