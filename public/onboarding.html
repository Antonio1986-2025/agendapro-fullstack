<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Boas-vindas</title>
  <link rel="stylesheet" href="design-system.css?v=20260623">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: var(--space-md); }
    .onboarding-card { background: var(--bg-card); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); width: 100%; max-width: 520px; padding: var(--space-xl); }
    .logo-area { text-align: center; margin-bottom: var(--space-lg); }
    .logo-area i { font-size: 2.5rem; color: var(--primary); }
    .logo-area h1 { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--text-primary); margin-top: var(--space-sm); }
    .logo-area p { color: var(--text-secondary); font-size: var(--text-sm); }
    .step-header { text-align: center; margin-bottom: var(--space-lg); }
    .step-header h2 { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--text-primary); }
    .step-header p { color: var(--text-secondary); font-size: var(--text-sm); margin-top: var(--space-xs); }
    .steps-indicator { display: flex; justify-content: center; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-color); transition: all var(--transition-fast); }
    .step-dot.active { background: var(--primary); transform: scale(1.3); }
    .step-dot.done { background: var(--success); }
    .step { display: none; }
    .step.active { display: block; }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .alert.success { background: var(--success-light); color: var(--success); display: block; }
    .nav-buttons { display: flex; gap: var(--space-sm); margin-top: var(--space-lg); }
    .nav-buttons .btn { flex: 1; }
    .checklist { list-style: none; padding: 0; }
    .checklist li { display: flex; align-items: center; gap: var(--space-sm); padding: var(--space-md); border-radius: var(--radius-md); margin-bottom: var(--space-sm); background: var(--bg-secondary); }
    .checklist li.done { opacity: 0.7; }
    .checklist .check-icon { width: 24px; text-align: center; color: var(--success); }
    .checklist .check-icon.pending { color: var(--text-muted); }
    .welcome-anim { text-align: center; padding: var(--space-xl) 0; }
    .welcome-anim i { font-size: 4rem; color: var(--primary); margin-bottom: var(--space-md); }
    .welcome-anim h2 { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--text-primary); margin-bottom: var(--space-sm); }
    .welcome-anim p { color: var(--text-secondary); }
    .hidden { display: none; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="onboarding-card">
    <div class="logo-area">
      <i class="fas fa-calendar-check"></i>
      <h1>AgendaPro</h1>
      <p>Vamos configurar sua barbearia em poucos passos</p>
    </div>

    <div class="steps-indicator" id="steps-dots">
      <span class="step-dot active"></span>
      <span class="step-dot"></span>
      <span class="step-dot"></span>
    </div>

    <div id="alerta" class="alert"></div>

    <!-- STEP 1: Serviços -->
    <div class="step active" data-step="1">
      <div class="step-header">
        <h2>Quais serviços você oferece?</h2>
        <p>Cadastre os principais serviços da sua barbearia</p>
      </div>
      <div class="field">
        <label>Nome do serviço</label>
        <input class="input" id="serv-nome" placeholder="Ex: Corte de cabelo">
      </div>
      <div class="field">
        <label>Preço (R$)</label>
        <input class="input" type="number" id="serv-preco" step="0.01" placeholder="30.00">
      </div>
      <div class="field">
        <label>Duração (minutos)</label>
        <input class="input" type="number" id="serv-duracao" value="30" min="10" step="5">
      </div>
      <div id="serv-lista" style="margin-bottom:var(--space-md);"></div>
      <button class="btn btn-secondary btn-full" onclick="adicionarServico()" style="margin-bottom:var(--space-sm);">
        <i class="fas fa-plus"></i> Adicionar mais um
      </button>
      <div class="nav-buttons">
        <button class="btn btn-primary btn-full" onclick="irPara(2)">Continuar <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <!-- STEP 2: Profissionais -->
    <div class="step" data-step="2">
      <div class="step-header">
        <h2>Quem trabalha na barbearia?</h2>
        <p>Cadastre pelo menos um profissional para receber agendamentos</p>
      </div>
      <div class="field">
        <label>Nome do profissional</label>
        <input class="input" id="prof-nome" placeholder="Ex: Carlos">
      </div>
      <div class="field">
        <label>Especialidade</label>
        <input class="input" id="prof-espec" placeholder="Ex: Barbeiro">
      </div>
      <div id="prof-lista" style="margin-bottom:var(--space-md);"></div>
      <button class="btn btn-secondary btn-full" onclick="adicionarProfissional()" style="margin-bottom:var(--space-sm);">
        <i class="fas fa-plus"></i> Adicionar mais um
      </button>
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="irPara(1)"><i class="fas fa-arrow-left"></i> Voltar</button>
        <button class="btn btn-primary" onclick="irPara(3)" style="flex:2;">Continuar <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <!-- STEP 3: Final -->
    <div class="step" data-step="3">
      <div class="welcome-anim">
        <i class="fas fa-check-circle" style="color:var(--success);"></i>
        <h2>Tudo pronto!</h2>
        <p>Sua barbearia está configurada. Vamos começar?</p>
      </div>
      <div class="checklist" id="checklist-final"></div>
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="irPara(2)"><i class="fas fa-arrow-left"></i> Voltar</button>
        <button class="btn btn-primary" onclick="finalizar()" style="flex:2;">
          <i class="fas fa-rocket"></i> Ir para o Dashboard
        </button>
      </div>
    </div>
  </div>

  <script src="api.js?v=20260623"></script>
  <script>
    if (!API.getToken()) window.location.href = 'login.html';

    let servicosTemp = [];
    let profsTemp = [];
    let passoAtual = 1;

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = 'alert ' + (tipo || 'error');
    }
    function esconderAlerta() {
      document.getElementById('alerta').className = 'alert';
    }

    function irPara(passo) {
      esconderAlerta();
      if (passo < passoAtual || passo > 3) return;
      passoAtual = passo;
      document.querySelectorAll('.step').forEach(s => s.classList.toggle('active', parseInt(s.dataset.step) === passo));
      document.querySelectorAll('.step-dot').forEach((d, i) => {
        d.className = 'step-dot' + (i + 1 === passo ? ' active' : i + 1 < passo ? ' done' : '');
      });
      if (passo === 3) renderChecklist();
    }

    async function adicionarServico() {
      const nome = document.getElementById('serv-nome').value.trim();
      const preco = parseFloat(document.getElementById('serv-preco').value);
      const duracao = parseInt(document.getElementById('serv-duracao').value) || 30;
      if (!nome) return mostrarAlerta('Digite o nome do serviço');
      if (!preco || preco <= 0) return mostrarAlerta('Digite um preço válido');

      try {
        await API.post('/servicos', { nome, preco: preco.toFixed(2), duracao });
        servicosTemp.push(nome);
        document.getElementById('serv-nome').value = '';
        document.getElementById('serv-preco').value = '';
        renderServicos();
        esconderAlerta();
      } catch (e) {
        mostrarAlerta(e.message);
      }
    }

    function renderServicos() {
      const el = document.getElementById('serv-lista');
      if (!servicosTemp.length) { el.innerHTML = ''; return; }
      el.innerHTML = servicosTemp.map(s =>
        `<div style="padding:var(--space-xs) 0;color:var(--text-secondary);font-size:var(--text-sm);"><i class="fas fa-check-circle" style="color:var(--success);"></i> ${s}</div>`
      ).join('');
    }

    async function adicionarProfissional() {
      const nome = document.getElementById('prof-nome').value.trim();
      const especialidade = document.getElementById('prof-espec').value.trim() || 'Barbeiro';
      if (!nome) return mostrarAlerta('Digite o nome do profissional');

      try {
        await API.post('/profissionais', { nome, especialidade });
        profsTemp.push(nome);
        document.getElementById('prof-nome').value = '';
        document.getElementById('prof-espec').value = '';
        renderProfissionais();
        esconderAlerta();
      } catch (e) {
        mostrarAlerta(e.message);
      }
    }

    function renderProfissionais() {
      const el = document.getElementById('prof-lista');
      if (!profsTemp.length) { el.innerHTML = ''; return; }
      el.innerHTML = profsTemp.map(p =>
        `<div style="padding:var(--space-xs) 0;color:var(--text-secondary);font-size:var(--text-sm);"><i class="fas fa-check-circle" style="color:var(--success);"></i> ${p}</div>`
      ).join('');
    }

    async function renderChecklist() {
      try {
        const s = await API.get('/auth/setup-status');
        const el = document.getElementById('checklist-final');
        el.innerHTML = `
          <li class="${s.servicos > 0 ? 'done' : ''}">
            <span class="check-icon ${s.servicos > 0 ? '' : 'pending'}"><i class="fas ${s.servicos > 0 ? 'fa-check-circle' : 'fa-circle'}"></i></span>
            <span>${s.servicos > 0 ? `${s.servicos} serviço(s) cadastrado(s)` : 'Nenhum serviço cadastrado'}</span>
          </li>
          <li class="${s.profissionais > 0 ? 'done' : ''}">
            <span class="check-icon ${s.profissionais > 0 ? '' : 'pending'}"><i class="fas ${s.profissionais > 0 ? 'fa-check-circle' : 'fa-circle'}"></i></span>
            <span>${s.profissionais > 0 ? `${s.profissionais} profissional(is) cadastrado(s)` : 'Nenhum profissional cadastrado'}</span>
          </li>
        `;
      } catch (e) {
        console.error(e);
      }
    }

    function finalizar() {
      window.location.href = 'dashboard-mobile.html';
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const user = API.getUser();
      if (user && user.nome) {
        document.querySelector('.logo-area p').textContent = `Bem-vindo, ${user.nome}! Vamos configurar sua barbearia.`;
      }
    });
  </script>
</body>
</html>
