<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro - Agenda</title>
  <link rel="stylesheet" href="design-system.css?v=20260623">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .mobile-app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); position: relative; }
    .header { position: sticky; top: 0; z-index: var(--z-sticky); background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: var(--space-md); }
    .header-content { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-md); }
    .header-title { display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--text-primary); }
    .back-btn { background: none; border: none; padding: var(--space-sm); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); }
    .date-nav { display: flex; align-items: center; justify-content: space-between; gap: var(--space-sm); }
    .date-atual { flex: 1; text-align: center; font-weight: var(--font-semibold); color: var(--text-primary); text-transform: capitalize; }
    .resumo { font-size: var(--text-sm); color: var(--text-secondary); text-align: center; margin-top: var(--space-sm); }
    .main-content { padding: var(--space-md); padding-bottom: 100px; }
    .ag-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: 0.5rem; display: flex; align-items: center; gap: var(--space-md); transition: all var(--transition-fast); position: relative; }
    .ag-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
    .ag-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); background: var(--border-color); }
    .ag-card.st-agendado::before { background: var(--warning); }
    .ag-card.st-confirmado::before { background: var(--success); }
    .ag-card.st-concluido::before { background: var(--primary-600); }
    .ag-card.st-cancelado { opacity: .5; }
    .ag-card.st-cancelado::before { background: var(--error); }
    .ag-hora { background: var(--primary-50); color: var(--primary-700); padding: 0.625rem 0.5rem; border-radius: var(--radius-md); font-weight: var(--font-bold); min-width: 56px; text-align: center; font-size: var(--text-sm); letter-spacing: -0.01em; }
    .ag-info { flex: 1; min-width: 0; }
    .ag-cliente { font-weight: var(--font-semibold); color: var(--text-primary); letter-spacing: -0.01em; font-size: var(--text-sm); margin-bottom: 0.125rem; }
    .ag-serv { font-size: var(--text-xs); color: var(--text-secondary); }
    .ag-prof { font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.0625rem; }
    .ag-especial { font-size: 0.625rem; background: var(--warning); color:#fff; padding: 1px 6px; border-radius: var(--radius-full); margin-left: 4px; font-weight: var(--font-medium); }
    .ag-menu { position: relative; }
    .menu-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); width: 32px; height: 32px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); transition: all var(--transition-fast); }
    .menu-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-hover); }
    .menu-pop { position: absolute; right: 0; top: 38px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); z-index: 10; display: none; min-width: 160px; overflow: hidden; }
    .menu-pop.open { display: block; animation: scaleIn 0.15s ease-out; }
    .menu-pop button { display: flex; align-items: center; gap: var(--space-sm); width: 100%; background: none; border: none; padding: 0.5rem 0.75rem; cursor: pointer; color: var(--text-primary); font-size: var(--text-sm); text-align: left; }
    .menu-pop button:hover { background: var(--bg-hover); }
    .empty { text-align: center; padding: var(--space-3xl) var(--space-md); color: var(--text-tertiary); }
    .empty i { font-size: 2.5rem; margin-bottom: var(--space-md); display: block; opacity: .4; }
    .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; background: var(--primary-600); color: #fff; border: none; border-radius: var(--radius-full); box-shadow: var(--shadow-lg); cursor: pointer; font-size: var(--text-xl); z-index: var(--z-fixed); transition: all var(--transition-fast); }
    .fab:hover { background: var(--primary-700); transform: scale(1.05); box-shadow: var(--shadow-xl); }
    .fab:active { transform: scale(0.95); }
    .modal-overlay { position: fixed; inset: 0; background: var(--bg-overlay); display: none; align-items: flex-end; justify-content: center; z-index: var(--z-modal); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0; width: 100%; max-width: 480px; padding: var(--space-lg); max-height: 92vh; overflow-y: auto; }
    .modal-title { font-size: var(--text-lg); font-weight: var(--font-bold); margin-bottom: var(--space-lg); }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-xs); color: var(--text-secondary); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    .switch-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-sm) 0; }
    .alert { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--space-md); display: none; }
    .alert.error { background: var(--error-light); color: var(--error); display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: var(--space-sm) 0; z-index: var(--z-sticky); }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: var(--space-sm); text-decoration: none; color: var(--text-secondary); border-radius: var(--radius-md); min-width: 56px; }
    .nav-item.active { color: var(--primary); background: var(--primary-light); }
    .nav-icon { font-size: var(--text-lg); margin-bottom: var(--space-xs); }
    .nav-label { font-size: var(--text-xs); font-weight: var(--font-medium); }

  /* AGENDA GRADE DESKTOP */
  .agenda-header-desktop { display: flex; justify-content: space-between; align-items: center; padding: var(--space-xl) var(--space-2xl); background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
  .agenda-nav-desktop { display: flex; align-items: center; gap: var(--space-sm); background: var(--bg-secondary); border-radius: var(--radius-lg); padding: var(--space-xs); }
  .agenda-nav-btn { background: none; border: none; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); font-weight: var(--font-medium); transition: all var(--transition-fast); }
  .agenda-nav-btn:hover { background: var(--bg-card); color: var(--text-primary); }
  .agenda-nav-btn.especial-on { color: var(--warning); border-color: var(--warning); }
  .agenda-nav-hoje { color: var(--primary); font-weight: var(--font-bold); }
  .agenda-nav-data { font-weight: var(--font-semibold); color: var(--text-primary); padding: 0 var(--space-sm); }

  .agenda-grade-wrap { overflow-x: auto; margin: var(--space-lg); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
  .agenda-grade { width: 100%; border-collapse: collapse; background: var(--bg-card); min-width: 600px; }
  .agenda-grade th { background: var(--bg-secondary); padding: var(--space-md) var(--space-sm); text-align: center; font-weight: var(--font-semibold); color: var(--text-primary); border-bottom: 2px solid var(--border-color); white-space: nowrap; }
  .agenda-grade th:first-child { text-align: center; width: 70px; }
  .agenda-grade td { padding: var(--space-sm); text-align: center; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); height: 52px; vertical-align: middle; cursor: pointer; transition: background var(--transition-fast); }
  .agenda-grade td:last-child { border-right: none; }
  .agenda-grade td:hover { background: var(--bg-secondary); }
  .agenda-grade td:first-child { font-weight: var(--font-semibold); color: var(--text-secondary); background: var(--bg-secondary); cursor: default; border-right: 2px solid var(--border-color); }
  .agenda-grade td:first-child:hover { background: var(--bg-secondary); }
  .cell-livre { color: var(--text-muted); font-size: var(--text-xs); }
  .cell-ag { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; background: var(--primary-light); border-radius: var(--radius-md); padding: 2px 8px; max-width: 100%; overflow: hidden; }
  .cell-ag .ag-cliente { font-weight: var(--font-semibold); color: var(--text-primary); font-size: var(--text-xs); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .cell-ag .ag-servico { font-size: 10px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .cell-ag .ag-preco { font-size: 10px; color: var(--primary); font-weight: var(--font-bold); }
  .prof-avatar-td { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: var(--font-bold); color: white; margin-right: var(--space-xs); vertical-align: middle; }
  .prof-cor-0 { background: #E67E22; }
  .prof-cor-1 { background: #3498DB; }
  .prof-cor-2 { background: #E74C3C; }
  .prof-cor-3 { background: #2ECC71; }
  .prof-cor-4 { background: #9B59B6; }
  .prof-cor-5 { background: #1ABC9C; }
@media (min-width: 768px) {
    .mobile-app { max-width: 100%; padding: 0 var(--space-lg); }
    .bottom-nav { display: none; }
    .main-content { padding-bottom: var(--space-md); }
  }
  </style>
</head>

  <script src="api.js?v=20260623"></script>
  <script>
    API.exigirLogin();
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
      else { html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
      const cls = isDark ? 'fa-moon' : 'fa-sun';
      document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas ' + cls);
    }
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.querySelectorAll('#theme-icon, #theme-icon-desk').forEach(el => el.className = 'fas fa-sun'); }
    document.addEventListener('DOMContentLoaded', function() {
      const user = API.getUser();
      if (user) {
        const avatar = document.getElementById('sidebar-avatar');
        const name = document.getElementById('sidebar-name');
        const role = document.getElementById('sidebar-role');
        if (avatar) avatar.textContent = (user.nome || 'U').charAt(0).toUpperCase();
        if (name) name.textContent = user.nome || 'Usuário';
        if (role) role.textContent = user.role === 'owner' ? 'Proprietário' : user.role;
      }
    });

    let dataAtual = new Date();
    let profissionais = [], servicos = [], clientes = [];
    let mostrarEspecial = false;

    function ymd(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function mudarDia(n) { dataAtual.setDate(dataAtual.getDate()+n); carregar(); }
    function irHoje() { dataAtual = new Date(); carregar(); }
    function toggleEspecial() {
      mostrarEspecial = !mostrarEspecial;
      document.querySelectorAll('#btn-especial, #btn-especial-mobile').forEach(el => el.classList.toggle('especial-on', mostrarEspecial));
      document.querySelectorAll('#especial-label, #especial-label-mobile').forEach(el => el.textContent = mostrarEspecial ? 'Especial ON' : 'Especial');
      carregar();
    }

    async function carregarBase() {
      [profissionais, servicos, clientes] = await Promise.all([
        API.get('/profissionais'), API.get('/servicos'), API.get('/clientes')
      ]);
      document.getElementById('f-prof').innerHTML = profissionais.map(p => `<option value="${p.id}">${p.nome}</option>`).join('') || '<option value="">Cadastre um profissional</option>';
      document.getElementById('f-serv').innerHTML = '<option value="">Sem serviço específico</option>' + servicos.map(s => `<option value="${s.id}">${s.nome} - R$ ${Number(s.preco).toFixed(2)}</option>`).join('');
    }

    async function carregar() {
      const dia = ymd(dataAtual);
      document.getElementById('data-label').textContent =
        dataAtual.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'short' });
      try {
        const ags = await API.get('/agendamentos?data=' + dia);
        render(ags);
      } catch (e) {
        document.getElementById('lista').innerHTML = `<div class="empty"><i class="fas fa-triangle-exclamation"></i> Erro: ${e.message}</div>`;
      }
    }

    function statusLabel(s) {
      return { agendado:'Agendado', confirmado:'Confirmado', concluido:'Concluído', cancelado:'Cancelado' }[s] || s;
    }

    function render(ags) {
      const ativos = ags.filter(a => a.status !== 'cancelado');
      document.getElementById('resumo').textContent = `${ativos.length} agendamento(s) neste dia`;
      const cont = document.getElementById('lista');
      if (!ags.length) {
        cont.innerHTML = `<div class="empty"><i class="fas fa-calendar-check"></i>Nenhum agendamento neste dia.<br>Toque no + para criar.</div>`;
      } else {
        cont.innerHTML = ags.map(a => {
          const hora = formatarHora(a.data_hora);
          const statusTexto = a.status === 'cancelado' ? '<span style="color:var(--error);font-weight:var(--font-bold);font-size:var(--text-xs);text-transform:uppercase;">CANCELADO</span> • ' : '';
          return `
          <div class="ag-card st-${a.status}">
            <div class="ag-hora">${hora}</div>
            <div class="ag-info">
              <div class="ag-cliente">${a.cliente_nome || 'Cliente'} ${a.is_especial ? '<span class="ag-especial">+50%</span>' : ''}</div>
              <div class="ag-serv">${a.servico_nome || 'Atendimento'} • R$ ${Number(a.preco).toFixed(2)}</div>
              <div class="ag-prof"><i class="fas fa-user-tie"></i> ${a.profissional_nome || ''} • ${statusTexto}${statusLabel(a.status)}</div>
            </div>
            <div class="ag-menu">
              <button class="menu-btn" onclick="toggleMenu('${a.id}', event)"><i class="fas fa-ellipsis-v"></i></button>
              <div class="menu-pop" id="menu-${a.id}">
                ${a.status === 'agendado' ? `<button onclick="setStatus('${a.id}','confirmado')"><i class="fas fa-check" style="color:var(--success)"></i> Confirmar</button>` : ''}
                ${a.status === 'confirmado' ? `<button onclick="setStatus('${a.id}','concluido')"><i class="fas fa-flag-checkered" style="color:var(--primary)"></i> Concluir</button>` : ''}
                ${a.status !== 'cancelado' ? `<button onclick="setStatus('${a.id}','cancelado')"><i class="fas fa-ban" style="color:var(--warning)"></i> Cancelar</button>` : ''}
                <button onclick="excluir('${a.id}')"><i class="fas fa-trash" style="color:var(--error)"></i> Excluir</button>
              </div>
            </div>
          </div>`;
        }).join('');
      }
      // Grade desktop
      renderGrade(ags);
    }

    const profCores = ['#E67E22','#3498DB','#E74C3C','#2ECC71','#9B59B6','#1ABC9C'];

    function renderGrade(ags) {
      const cont = document.getElementById('lista-tabela');
      if (!profissionais.length) { cont.innerHTML = ''; return; }

      const dataLabel = document.getElementById('data-label-desktop');
      if (dataLabel) dataLabel.textContent = dataAtual.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });

      const horarios = [];
      const agora = new Date();
      const ehHoje = ymd(dataAtual) === ymd(agora);
      const addRange = (hIni, mIni, hFim, mFim) => {
        let [h, m] = [hIni, mIni];
        while (h < hFim || (h === hFim && m < mFim)) {
          horarios.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
          m += 30;
          if (m >= 60) { m -= 60; h++; }
        }
      };
      addRange(7, 30, 11, 0);
      addRange(13, 0, 19, 0);
      if (mostrarEspecial) addRange(19, 0, 21, 0);
      const horariosFiltrados = horarios.filter(hora => {
        if (!ehHoje) return true;
        const [hh, mm] = hora.split(':').map(Number);
        return (hh * 60 + mm) >= (agora.getHours() * 60 + agora.getMinutes());
      });

      const mapa = {};
      ags.filter(a => a.status !== 'cancelado').forEach(a => {
        const h = formatarHora(a.data_hora);
        const pn = a.profissional_nome || 'Sem profissional';
        if (!mapa[pn]) mapa[pn] = {};
        mapa[pn][h] = a;
      });

      let html = '<div class="agenda-grade-wrap"><table class="agenda-grade"><thead><tr>';
      html += '<th>HORA</th>';
      profissionais.forEach((p, i) => {
        const ini = p.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
        const cor = profCores[i % profCores.length];
        html += `<th><span class="prof-avatar-td" style="background:${cor}">${ini}</span> ${p.nome.toUpperCase()}</th>`;
      });
      html += '</tr></thead><tbody>';

      horariosFiltrados.forEach(hora => {
        html += '<tr>';
        html += `<td>${hora}</td>`;
        profissionais.forEach(p => {
          const ag = mapa[p.nome] && mapa[p.nome][hora];
          if (ag) {
            const cli = ag.cliente_nome || 'Cliente';
            const serv = ag.servico_nome || '';
            html += `<td onclick="setStatus('${ag.id}','confirmado')"><div class="cell-ag"><span class="ag-cliente">${cli}</span>${serv ? `<span class="ag-servico">${serv}</span>` : ''}<span class="ag-preco">R$ ${Number(ag.preco||0).toFixed(2)}</span></div></td>`;
          } else {
            html += `<td onclick="abrirModal()"><span class="cell-livre">+ LIVRE</span></td>`;
          }
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      cont.innerHTML = html;
    }

    let menuAberto = null;
    function toggleMenu(id, ev) {
      ev.stopPropagation();
      const el = document.getElementById('menu-' + id);
      if (menuAberto && menuAberto !== el) menuAberto.classList.remove('open');
      el.classList.toggle('open');
      menuAberto = el.classList.contains('open') ? el : null;
    }
    document.addEventListener('click', () => { if (menuAberto) { menuAberto.classList.remove('open'); menuAberto = null; } });

    async function setStatus(id, status) {
      try { await API.patch('/agendamentos/' + id + '/status', { status }); await carregar(); }
      catch (e) { alert('Erro: ' + e.message); }
    }
    async function excluir(id) {
      if (!confirm('Excluir este agendamento?')) return;
      try { await API.del('/agendamentos/' + id); await carregar(); }
      catch (e) { alert('Erro: ' + e.message); }
    }

    function abrirModal() {
      if (!profissionais.length) { alert('Cadastre ao menos um profissional antes.'); return; }
      document.getElementById('modal-alerta').className = 'alert';
      document.getElementById('f-cliente').value = '';
      document.getElementById('f-telefone').value = '';
      document.getElementById('f-data').value = ymd(dataAtual);
      const agoraM = new Date();
      const ehHojeModal = ymd(dataAtual) === ymd(agoraM);
      const minAgora = agoraM.getHours() * 60 + agoraM.getMinutes();
      const todosHorarios = [];
      const addRangeModal = (hIni, mIni, hFim, mFim) => {
        let [h, m] = [hIni, mIni];
        while (h < hFim || (h === hFim && m < mFim)) {
          todosHorarios.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
          m += 30;
          if (m >= 60) { m -= 60; h++; }
        }
      };
      addRangeModal(7, 30, 11, 0);
      addRangeModal(13, 0, 19, 0);
      const proximaHora = ehHojeModal
        ? todosHorarios.find(h => { const [hh,mm] = h.split(':').map(Number); return hh*60+mm >= minAgora; }) || '07:30'
        : '07:30';
      document.getElementById('f-hora').value = proximaHora;
      document.getElementById('f-especial').checked = false;
      document.getElementById('modal').classList.add('open');
    }
    function fecharModal() { document.getElementById('modal').classList.remove('open'); }

    // Cria/recupera cliente pelo telefone e retorna o id
    async function obterClienteId(nome, telefone) {
      if (!telefone) return null;
      try {
        const novo = await API.post('/clientes', { nome, telefone });
        return novo.id;
      } catch (e) {
        // ja existe -> busca pelo telefone
        const achados = await API.get('/clientes?busca=' + encodeURIComponent(telefone));
        const match = achados.find(c => (c.telefone||'').replace(/\D/g,'') === telefone.replace(/\D/g,''));
        return match ? match.id : (achados[0] ? achados[0].id : null);
      }
    }

    async function salvar() {
      const a = document.getElementById('modal-alerta');
      const nome = document.getElementById('f-cliente').value.trim();
      const telefone = document.getElementById('f-telefone').value.trim();
      const data = document.getElementById('f-data').value;
      const hora = document.getElementById('f-hora').value;
      const profId = document.getElementById('f-prof').value;
      const servId = document.getElementById('f-serv').value;
      const especial = document.getElementById('f-especial').checked;

      if (!nome) { a.textContent = 'Informe o nome do cliente'; a.className = 'alert error'; return; }
      if (!profId || !data || !hora) { a.textContent = 'Profissional, data e hora são obrigatórios'; a.className = 'alert error'; return; }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true; btn.textContent = 'Agendando...';
      try {
        const clienteId = await obterClienteId(nome, telefone);
        await API.post('/agendamentos', {
          cliente_id: clienteId,
          profissional_id: profId,
          servico_id: servId || null,
          data_hora: `${data}T${hora}:00`,
          is_especial: especial,
        });
        fecharModal();
        clientes = await API.get('/clientes');
        await carregar();
      } catch (e) {
        a.textContent = e.message; a.className = 'alert error';
      } finally { btn.disabled = false; btn.textContent = 'Agendar'; }
    }

    (async function init() {
      try { await carregarBase(); } catch (e) { console.error(e); }
      await carregar();
    })();
  </script>
</body>
</html>
