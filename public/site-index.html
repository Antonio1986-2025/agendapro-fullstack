<!DOCTYPE html>
<html lang="pt-BR" data-theme="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>💈 Barbearia - Agendamento Online</title>
  <!-- Landing page redirect / agendar.html redirect / etc -->
  <script>
    // Detecta se veio do barbeiro (verifica hash)
    if (!location.hash && !location.pathname.includes('index.html')) {
      // Redireciona para versao com hash
      location.replace('/site/index.html#home');
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <link rel="stylesheet" href="site/css/style.css">
  <script src="site/js/site.js"></script>
</body>
</html>
