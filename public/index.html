<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaPro</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
    .loader { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto var(--space-md); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Carregando AgendaPro...</p>
  </div>
  <script src="api.js"></script>
  <script>
    // Entrada do sistema: vai pro dashboard se logado, senao login
    window.location.replace(API.getToken() ? 'dashboard-mobile.html' : 'login.html');
  </script>
</body>
</html>
